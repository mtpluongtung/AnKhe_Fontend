<div class="card border-0 shadow-sm rounded-4">
  <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold">Quản lý tin tức</h5>
    <div class="d-flex align-items-center flex-grow-1 mx-4">
      <div class="input-group input-group-sm" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
        <input type="text" class="form-control border-start-0 ps-0" 
               placeholder="Tìm theo tiêu đề..." 
               [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
        <button class="btn btn-warning" (click)="onSearch()">Tìm</button>
      </div>
    </div>
    <button class="btn btn-warning fw-bold" (click)="openAddModal()">
      <i class="bi bi-pencil-plus me-1"></i> Đăng tin mới
    </button>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4">Tiêu đề</th>
            <th>Ngày đăng</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of newsList">
            <td class="ps-4">
              <div class="d-flex align-items-center">
                <img [src]="item.imageUrl || 'assets/images/default-news.png'" width="50" class="rounded me-2">
                <span class="fw-medium text-truncate" style="max-width: 300px;">{{item.title}}</span>
                <span class="badge bg-danger ms-2" *ngIf="item.isHot">Hot</span>
              </div>
            </td>
            <td>{{item.createdDate | date:'dd/MM/yyyy'}}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-2" (click)="openEditModal(item)">
                <i class="bi bi-pencil me-1"></i> Sửa
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteNews(item.id)">
                <i class="bi bi-trash me-1"></i> Xóa
              </button>
            </td>
          </tr>
          <tr *ngIf="newsList.length === 0 && !loading">
            <td colspan="3" class="text-center py-5 text-muted">Chưa có tin tức nào.</td>
          </tr>
          <tr *ngIf="loading">
            <td colspan="3" class="text-center py-5">
              <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="card-footer bg-white border-0 py-3">
      <app-pagination 
        [currentPage]="currentPage" 
        [pageSize]="pageSize" 
        [totalItems]="totalItems" 
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </div>
  </div>
</div>

<!-- News Modal -->
<div class="modal fade" [class.show]="showModal" [style.display]="showModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 py-3">
        <h5 class="modal-title fw-bold">{{isEditMode ? 'Cập nhật tin tức' : 'Đăng tin mới'}}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body p-4 pt-0">
        <form #newsForm="ngForm">
          <div class="row g-3">
            <div class="col-md-8">
              <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Tiêu đề tin tức</label>
                <input type="text" class="form-control" name="title" [(ngModel)]="currentNews.title" required placeholder="Nhập tiêu đề">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Mô tả ngắn</label>
                <textarea class="form-control" name="description" [(ngModel)]="currentNews.description" rows="3" placeholder="Mô tả tóm tắt nội dung"></textarea>
              </div>
            </div>
            <div class="col-md-4">
              <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Hình ảnh (URL)</label>
                <input type="text" class="form-control" name="imageUrl" [(ngModel)]="currentNews.imageUrl" placeholder="Link ảnh">
                <div class="mt-2 text-center border rounded p-2 bg-light" style="height: 120px; display: flex; align-items: center; justify-content: center;">
                  <img *ngIf="currentNews.imageUrl" [src]="currentNews.imageUrl" style="max-height: 100%; max-width: 100%;">
                  <span *ngIf="!currentNews.imageUrl" class="text-muted small">Xem trước ảnh</span>
                </div>
              </div>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-md-12 d-flex align-items-center">
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="isHot" id="isHot" [(ngModel)]="currentNews.isHot">
                <label class="form-check-label fw-bold" for="isHot">Tin nổi bật (Hot)</label>
              </div>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label fw-bold small text-uppercase">Nội dung chi tiết</label>
            <textarea class="form-control" name="content" [(ngModel)]="currentNews.content" rows="6" placeholder="Nội dung bài viết (có thể dùng HTML)"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-light rounded-pill px-4" (click)="closeModal()">Thoát</button>
        <button type="button" class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm" [disabled]="!newsForm.form.valid" (click)="saveNews()">
          {{isEditMode ? 'Lưu cập nhật' : 'Đăng bài ngay'}}
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="showModal"></div>
