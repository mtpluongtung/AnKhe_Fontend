<div class="card border-0 shadow-sm rounded-4">
  <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold">Danh sách sản phẩm</h5>
    <button (click)="openAddModal()" class="btn btn-warning fw-bold">
      <i class="bi bi-plus-lg me-1"></i> Thêm sản phẩm
    </button>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4">ID</th>
            <th>Hình ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Kho</th>
            <th>Hot</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td class="ps-4">{{product.id}}</td>
            <td>
              <img [src]="product.imageUrl || 'assets/images/placeholder.png'" width="50" height="50" class="rounded shadow-sm">
            </td>
            <td class="fw-medium">{{product.name}}</td>
            <td class="text-danger fw-bold">{{product.price | number:'1.0-0'}}₫</td>
            <td><span class="badge bg-info text-dark">{{product.category?.name || 'Chưa phân loại'}}</span></td>
            <td>
              <span class="badge" [ngClass]="product.stockQuantity > 10 ? 'bg-success' : (product.stockQuantity > 0 ? 'bg-warning text-dark' : 'bg-secondary')">
                {{product.stockQuantity}}
              </span>
            </td>
            <td>
              <span class="badge bg-danger" *ngIf="product.isHot">
                <i class="bi bi-fire"></i> HOT
              </span>
              <span class="badge bg-light text-dark border" *ngIf="!product.isHot">Thường</span>
            </td>
            <td class="text-center d-flex justify-content-center">
              <button class="btn btn-sm btn-primary me-2" (click)="openEditModal(product)" title="Sửa">
                <i class="bi bi-pencil-square"></i> Sửa
              </button>
              <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)" title="Xóa">
                <i class="bi bi-trash"></i> Xóa
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Dialog -->
<div class="modal fade show d-block" *ngIf="showModal" tabindex="-1" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow-lg">
      <div class="modal-header bg-warning py-3">
        <h5 class="modal-title fw-bold">{{ isEditMode ? 'Sửa sản phẩm' : 'Thêm sản phẩm mới' }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form #productForm="ngForm" (ngSubmit)="saveProduct()">
          <div class="row">
            <div class="col-md-12 mb-3">
              <label class="form-label fw-bold small text-uppercase">Tên sản phẩm</label>
              <input type="text" class="form-control" name="name" [(ngModel)]="currentProduct.name" required placeholder="Nhập tên máy tính...">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold small text-uppercase">Giá bán (₫)</label>
              <input type="number" class="form-control" name="price" [(ngModel)]="currentProduct.price" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold small text-uppercase">Số lượng kho</label>
              <input type="number" class="form-control" name="stockQuantity" [(ngModel)]="currentProduct.stockQuantity" required min="0">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold small text-uppercase">Danh mục</label>
              <select class="form-select" name="categoryId" [(ngModel)]="currentProduct.categoryId" required>
                <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
              </select>
            </div>
            <div class="col-md-12 mb-3">
              <label class="form-label fw-bold small text-uppercase">Link hình ảnh</label>
              <input type="text" class="form-control" name="imageUrl" [(ngModel)]="currentProduct.imageUrl" placeholder="https://...">
            </div>
            <div class="col-md-12 mb-3">
              <label class="form-label fw-bold small text-uppercase">Mô tả chi tiết</label>
              <textarea class="form-control" name="description" [(ngModel)]="currentProduct.description" rows="3"></textarea>
            </div>
            <div class="col-md-12 mb-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="isHot" [(ngModel)]="currentProduct.isHot" id="hotCheck">
                <label class="form-check-label fw-bold" for="hotCheck">Sản phẩm nổi bật (Hot)</label>
              </div>
            </div>
          </div>
          <div class="modal-footer border-0 px-0 pb-0">
            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" (click)="closeModal()">Đóng</button>
            <button type="submit" class="btn btn-warning px-5 fw-bold text-uppercase shadow-sm">
              {{ isEditMode ? 'Lưu cập nhật' : 'Thêm sản phẩm' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
