<div class="user-management-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 fw-bold mb-0">Quản lý người dùng</h2>
    <div class="d-flex align-items-center flex-grow-1 mx-4">
      <div class="input-group input-group-sm" style="max-width: 300px;">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
        <input type="text" class="form-control border-start-0 ps-0" 
               placeholder="Tìm username, email, tên..." 
               [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
        <button class="btn btn-primary" (click)="onSearch()">Tìm</button>
      </div>
    </div>
    <button class="btn btn-outline-primary" (click)="onSearch()">
      <i class="bi bi-arrow-clockwise me-1"></i> Làm mới
    </button>
  </div>

  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light text-muted small text-uppercase">
            <tr>
              <th class="px-4 py-3 border-0">Username</th>
              <th class="py-3 border-0">Họ và tên</th>
              <th class="py-3 border-0">Email</th>
              <th class="py-3 border-0">Quyền</th>
              <th class="px-4 py-3 border-0 text-end">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="loading" class="text-center">
              <td colspan="5" class="py-5 text-muted">
                <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                Đang tải danh sách người dùng...
              </td>
            </tr>
            <tr *ngIf="!loading && users.length === 0" class="text-center">
              <td colspan="5" class="py-5 text-muted">Không tìm thấy người dùng nào.</td>
            </tr>
            <tr *ngFor="let user of users">
              <td class="px-4 py-3">
                <div class="d-flex align-items-center">
                  <div class="avatar bg-light text-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
                    {{user.username.charAt(0).toUpperCase()}}
                  </div>
                  <span class="fw-medium">{{user.username}}</span>
                </div>
              </td>
              <td class="py-3">{{user.fullName || '---'}}</td>
              <td class="py-3 text-muted">{{user.email}}</td>
              <td class="py-3">
                <span class="badge rounded-pill px-3" 
                      [ngClass]="user.role === 'Admin' ? 'bg-danger-subtle text-danger border border-danger' : 'bg-primary-subtle text-primary border border-primary'">
                  {{user.role}}
                </span>
              </td>
              <td class="px-4 py-3 text-end">
                <button class="btn btn-sm" 
                        [ngClass]="user.role === 'Admin' ? 'btn-outline-primary' : 'btn-outline-danger'"
                        (click)="toggleRole(user)">
                  <i class="bi" [ngClass]="user.role === 'Admin' ? 'bi-person' : 'bi-shield-lock'"></i>
                  {{user.role === 'Admin' ? 'Hạ quyền xuống Customer' : 'Nâng quyền lên Admin'}}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="card-footer bg-white border-0 py-3">
        <app-pagination 
          [currentPage]="currentPage" 
          [pageSize]="pageSize" 
          [totalItems]="totalItems" 
          (pageChange)="onPageChange($event)">
        </app-pagination>
      </div>
    </div>
  </div>
</div>
