<div class="row justify-content-center py-5">
  <div class="col-md-4">
    <div class="card shadow border-0 rounded-4 overflow-hidden">
      <div class="card-header bg-tgdd py-3 text-center border-0">
        <h4 class="mb-0 fw-bold">Đăng nhập tài khoản</h4>
      </div>
      <div class="card-body p-4">
        <form (ngSubmit)="f.form.valid && login()" #f="ngForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <input type="text" class="form-control" name="username" [(ngModel)]="model.username" #username="ngModel" required />
            <div *ngIf="f.submitted && !username.valid" class="text-danger small mt-1">Vui lòng nhập tên đăng nhập</div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" name="password" [(ngModel)]="model.password" #password="ngModel" required />
            <div *ngIf="f.submitted && !password.valid" class="text-danger small mt-1">Vui lòng nhập mật khẩu</div>
          </div>
          <div *ngIf="error" class="alert alert-danger mb-4 py-2">{{error}}</div>
          <div class="d-grid mb-3">
            <button [disabled]="loading" class="btn btn-dark btn-lg">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              Đăng nhập
            </button>
          </div>
          <div class="text-center">
            <span class="text-muted">Chưa có tài khoản?</span> 
            <a routerLink="/register" class="text-tgdd-blue text-decoration-none ms-1">Đăng ký ngay</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
